repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      # Linter (with autofix)
      - id: ruff
        args: [--fix]
      # Formatter
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        # Run against our source/test/script dirs; install our type deps so
        # strict checking sees real signatures.
        additional_dependencies:
          - numpy>=2.0
          - scipy-stubs
          - pydantic>=2.7
        args: [--strict]
        files: ^(src|tests|scripts)/