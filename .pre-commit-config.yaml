repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      # Linter (with autofix)
      - id: ruff
        args: [--fix]
      # Formatter
      - id: ruff-format
  
  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict, via uv)
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
        files: ^(src|tests|)/
